name: Nightly AI Batch Processor

on:
  schedule:
    - cron: '30 20 * * *'   # 2:00 AM IST = 20:30 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  process-pending-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/batch_processor/requirements.txt

      - name: Run batch processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_ID: manthan2876/CivicConnect-Classifier
          OPEN_SOURCE_LLM_KEY: ${{ secrets.OPEN_SOURCE_LLM_KEY }}
        run: python scripts/batch_processor/process_jobs.py
